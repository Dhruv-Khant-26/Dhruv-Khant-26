<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <radialGradient id="bgE" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a0020"/>
      <stop offset="100%" stop-color="#010005"/>
    </radialGradient>
    <radialGradient id="portalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#7b2fff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowE">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowESm">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="quoteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
  </defs>

  <rect width="900" height="320" fill="url(#bgE)"/>

  <!-- Portal rings -->
  <g transform="translate(450, 160)">
    <!-- Outermost ring -->
    <circle r="140" fill="none" stroke="#7b2fff" stroke-width="0.5" opacity="0.3">
      <animate attributeName="r" values="140;155;140" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle r="115" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" stroke-dasharray="8,6">
      <animate attributeName="r" values="115;125;115" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle r="90" fill="none" stroke="#7b2fff" stroke-width="1" opacity="0.5" stroke-dasharray="5,4">
      <animate attributeName="r" values="90;100;90" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle r="65" fill="none" stroke="#00ffcc" stroke-width="1.2" opacity="0.6" stroke-dasharray="4,3">
      <animate attributeName="r" values="65;72;65" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="40;46;40" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner portal glow -->
    <circle r="25" fill="url(#portalGrad)" filter="url(#glowE)">
      <animate attributeName="r" values="25;35;25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="8" fill="white" filter="url(#glowE)" opacity="0.9">
      <animate attributeName="r" values="8;12;8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Converging particles -->
  <g filter="url(#glowESm)">
    <circle r="2" fill="#00d4ff" opacity="0.8">
      <animateMotion path="M50,50 L450,160" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#7b2fff" opacity="0.8">
      <animateMotion path="M850,50 L450,160" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle r="1.5" fill="#00ffcc" opacity="0.8">
      <animateMotion path="M50,270 L450,160" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle r="1.5" fill="#ffffff" opacity="0.8">
      <animateMotion path="M850,270 L450,160" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle r="2" fill="#00d4ff" opacity="0.8">
      <animateMotion path="M200,20 L450,160" dur="3.2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle r="2" fill="#7b2fff" opacity="0.8">
      <animateMotion path="M700,20 L450,160" dur="3.7s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3.7s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle r="1.5" fill="#00ffcc" opacity="0.8">
      <animateMotion path="M200,300 L450,160" dur="4.5s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="4.5s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle r="1.5" fill="#ffffff" opacity="0.8">
      <animateMotion path="M700,300 L450,160" dur="2.6s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2.6s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
  </g>

  <!-- Quote text above portal -->
  <text x="450" y="75" font-family="Arial Black, sans-serif" font-size="17" fill="url(#quoteGrad)"
        text-anchor="middle" font-weight="900" filter="url(#glowESm)">
    "The future is not predicted.
  </text>
  <text x="450" y="100" font-family="Arial Black, sans-serif" font-size="17" fill="url(#quoteGrad)"
        text-anchor="middle" font-weight="900" filter="url(#glowESm)">
    It is engineered."
  </text>

  <!-- Bottom attribution -->
  <text x="450" y="260" font-family="'Courier New', monospace" font-size="11" fill="#00d4ff"
        text-anchor="middle" letter-spacing="4" opacity="0.8">— DHRUV KHANT</text>
  <text x="450" y="282" font-family="'Courier New', monospace" font-size="9" fill="#7b2fff"
        text-anchor="middle" letter-spacing="6" opacity="0.6">DATA · AI · GENERATIVE · ML</text>
  <text x="450" y="305" font-family="'Courier New', monospace" font-size="8" fill="#333366"
        text-anchor="middle" letter-spacing="3" opacity="0.5">brainybeam · 2024–present</text>
</svg>
