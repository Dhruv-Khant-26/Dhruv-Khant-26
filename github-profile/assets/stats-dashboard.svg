<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <radialGradient id="bgSt" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <filter id="glowSt">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStSm">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="arcBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="arcPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff00cc"/>
    </linearGradient>
    <linearGradient id="arcCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00aa88"/>
    </linearGradient>
  </defs>

  <rect width="900" height="180" fill="url(#bgSt)"/>

  <!-- Title -->
  <text x="450" y="28" font-family="Arial Black, sans-serif" font-size="11" fill="#00d4ff"
        text-anchor="middle" letter-spacing="8" opacity="0.8">— SYSTEM METRICS —</text>

  <!-- Rotating rings (decorative) -->
  <g transform="translate(450, 105)">
    <circle r="130" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.1" stroke-dasharray="3,8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle r="100" fill="none" stroke="#7b2fff" stroke-width="0.5" opacity="0.1" stroke-dasharray="3,6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Left stat card: Commits -->
  <g transform="translate(55, 50)">
    <rect x="0" y="0" width="140" height="100" rx="6" fill="#060614" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
    <line x1="0" y1="0" x2="140" y2="0" stroke="#00d4ff" stroke-width="2" filter="url(#glowStSm)"/>
    <!-- Pulsing energy ring -->
    <circle cx="70" cy="42" r="28" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="28;34;28" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="42" r="22" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="70" y="38" font-family="Arial Black, sans-serif" font-size="16" fill="#00d4ff"
          text-anchor="middle" font-weight="900" filter="url(#glowStSm)">∞</text>
    <text x="70" y="52" font-family="'Courier New', monospace" font-size="7" fill="#6699bb" text-anchor="middle">COMMITS</text>
    <text x="70" y="82" font-family="'Courier New', monospace" font-size="8" fill="#00d4ff" text-anchor="middle">GROWING DAILY</text>
    <text x="70" y="96" font-family="'Courier New', monospace" font-size="7" fill="#334455" text-anchor="middle">streak: active</text>
  </g>

  <!-- Center: Main stats area (placeholder for actual GitHub stats widget) -->
  <g transform="translate(220, 45)">
    <rect x="0" y="0" width="460" height="110" rx="8" fill="#060614" stroke="#7b2fff" stroke-width="1" opacity="0.9"/>
    <line x1="0" y1="0" x2="460" y2="0" stroke="#7b2fff" stroke-width="2" filter="url(#glowStSm)"/>
    <!-- Grid lines inside card -->
    <g stroke="#111130" stroke-width="0.5" opacity="0.8">
      <line x1="153" y1="10" x2="153" y2="100"/>
      <line x1="307" y1="10" x2="307" y2="100"/>
    </g>
    <!-- Stat 1: Languages -->
    <text x="76" y="38" font-family="Arial Black, sans-serif" font-size="13" fill="#7b2fff"
          text-anchor="middle" font-weight="900">Python</text>
    <text x="76" y="54" font-family="'Courier New', monospace" font-size="7" fill="#9966cc" text-anchor="middle">PRIMARY LANGUAGE</text>
    <rect x="26" y="62" width="100" height="4" rx="2" fill="#111130"/>
    <rect x="26" y="62" width="85" height="4" rx="2" fill="url(#arcPurple)" filter="url(#glowStSm)">
      <animate attributeName="width" values="0;85" dur="2s" fill="freeze" begin="0.5s"/>
    </rect>
    <text x="76" y="85" font-family="Arial Black, sans-serif" font-size="13" fill="#9966cc"
          text-anchor="middle" font-weight="900">SQL</text>
    <text x="76" y="99" font-family="'Courier New', monospace" font-size="7" fill="#666699" text-anchor="middle">Data · Analytics</text>

    <!-- Stat 2: Focus area -->
    <text x="230" y="38" font-family="Arial Black, sans-serif" font-size="13" fill="#00d4ff"
          text-anchor="middle" font-weight="900">Gen AI</text>
    <text x="230" y="54" font-family="'Courier New', monospace" font-size="7" fill="#6699bb" text-anchor="middle">SPECIALIZATION</text>
    <rect x="180" y="62" width="100" height="4" rx="2" fill="#111130"/>
    <rect x="180" y="62" width="92" height="4" rx="2" fill="url(#arcBlue)" filter="url(#glowStSm)">
      <animate attributeName="width" values="0;92" dur="2.2s" fill="freeze" begin="0.7s"/>
    </rect>
    <text x="230" y="85" font-family="Arial Black, sans-serif" font-size="13" fill="#6699bb"
          text-anchor="middle" font-weight="900">LLMs</text>
    <text x="230" y="99" font-family="'Courier New', monospace" font-size="7" fill="#446688" text-anchor="middle">RAG · Agents · Fine-tune</text>

    <!-- Stat 3: Tools -->
    <text x="384" y="38" font-family="Arial Black, sans-serif" font-size="13" fill="#00ffcc"
          text-anchor="middle" font-weight="900">AWS</text>
    <text x="384" y="54" font-family="'Courier New', monospace" font-size="7" fill="#55aa88" text-anchor="middle">CLOUD PLATFORM</text>
    <rect x="334" y="62" width="100" height="4" rx="2" fill="#111130"/>
    <rect x="334" y="62" width="75" height="4" rx="2" fill="url(#arcCyan)" filter="url(#glowStSm)">
      <animate attributeName="width" values="0;75" dur="1.8s" fill="freeze" begin="0.9s"/>
    </rect>
    <text x="384" y="85" font-family="Arial Black, sans-serif" font-size="13" fill="#55aa88"
          text-anchor="middle" font-weight="900">Azure</text>
    <text x="384" y="99" font-family="'Courier New', monospace" font-size="7" fill="#336655" text-anchor="middle">GCP · Docker · MLflow</text>
  </g>

  <!-- Right stat card: Stars -->
  <g transform="translate(705, 50)">
    <rect x="0" y="0" width="140" height="100" rx="6" fill="#060614" stroke="#00ffcc" stroke-width="1" opacity="0.9"/>
    <line x1="0" y1="0" x2="140" y2="0" stroke="#00ffcc" stroke-width="2" filter="url(#glowStSm)"/>
    <circle cx="70" cy="42" r="28" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="28;34;28" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="42" r="22" fill="none" stroke="#00ffcc" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="70" y="38" font-family="Arial Black, sans-serif" font-size="16" fill="#00ffcc"
          text-anchor="middle" font-weight="900">⬡</text>
    <text x="70" y="52" font-family="'Courier New', monospace" font-size="7" fill="#55aa88" text-anchor="middle">PROJECTS</text>
    <text x="70" y="82" font-family="'Courier New', monospace" font-size="8" fill="#00ffcc" text-anchor="middle">AI · ML · DATA</text>
    <text x="70" y="96" font-family="'Courier New', monospace" font-size="7" fill="#334455" text-anchor="middle">open source</text>
  </g>
</svg>
