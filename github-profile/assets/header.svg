<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="40%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#00ffcc"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <linearGradient id="beamV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="barClip">
      <rect x="200" y="290" width="500" height="8" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="42" x2="900" y2="42"/><line x1="0" y1="84" x2="900" y2="84"/>
    <line x1="0" y1="126" x2="900" y2="126"/><line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="210" x2="900" y2="210"/><line x1="0" y1="252" x2="900" y2="252"/>
    <line x1="0" y1="294" x2="900" y2="294"/><line x1="0" y1="336" x2="900" y2="336"/>
    <line x1="0" y1="378" x2="900" y2="378"/>
    <line x1="90" y1="0" x2="90" y2="420"/><line x1="180" y1="0" x2="180" y2="420"/>
    <line x1="270" y1="0" x2="270" y2="420"/><line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="450" y1="0" x2="450" y2="420"/><line x1="540" y1="0" x2="540" y2="420"/>
    <line x1="630" y1="0" x2="630" y2="420"/><line x1="720" y1="0" x2="720" y2="420"/>
    <line x1="810" y1="0" x2="810" y2="420"/>
  </g>

  <!-- Ambient orbs -->
  <ellipse cx="150" cy="210" rx="120" ry="80" fill="#7b2fff" opacity="0.06" filter="url(#blur-soft)"/>
  <ellipse cx="750" cy="210" rx="120" ry="80" fill="#00d4ff" opacity="0.06" filter="url(#blur-soft)"/>

  <!-- Boot sequence text lines (fade in one by one) -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#00d4ff">
    <text x="50" y="52" opacity="0">
      &gt; INITIALIZING NEURAL SYSTEMS...
      <animate attributeName="opacity" values="0;0.7;0.7" keyTimes="0;0.05;1" dur="6s" fill="freeze" begin="0.2s"/>
    </text>
    <text x="50" y="72" opacity="0">
      &gt; LOADING COGNITIVE ARCHITECTURE... [OK]
      <animate attributeName="opacity" values="0;0.7;0.7" keyTimes="0;0.05;1" dur="6s" fill="freeze" begin="0.7s"/>
    </text>
    <text x="50" y="92" fill="#7b2fff" opacity="0">
      &gt; CONNECTING DATA STREAMS.......... [DONE]
      <animate attributeName="opacity" values="0;0.7;0.7" keyTimes="0;0.05;1" dur="6s" fill="freeze" begin="1.1s"/>
    </text>
    <text x="50" y="112" fill="#00ffcc" opacity="0">
      &gt; ARTIFICIAL INTELLIGENCE INITIALIZED
      <animate attributeName="opacity" values="0;0.8;0.8" keyTimes="0;0.05;1" dur="6s" fill="freeze" begin="1.5s"/>
    </text>
    <text x="50" y="132" opacity="0">
      &gt; BOOTING CONSCIOUSNESS MODULE...... [OK]
      <animate attributeName="opacity" values="0;0.7;0.7" keyTimes="0;0.05;1" dur="6s" fill="freeze" begin="1.9s"/>
    </text>
    <text x="50" y="152" fill="#7b2fff" opacity="0">
      &gt; IDENTITY VERIFIED: DHRUV KHANT
      <animate attributeName="opacity" values="0;0.9;0.9" keyTimes="0;0.05;1" dur="6s" fill="freeze" begin="2.3s"/>
    </text>
  </g>

  <!-- Loading bar track -->
  <rect x="200" y="285" width="500" height="8" rx="4" fill="#111130" opacity="0">
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.4;1" dur="6s" fill="freeze" begin="0s"/>
  </rect>
  <!-- Loading bar fill -->
  <g opacity="0" clip-path="url(#barClip)">
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.4;1" dur="6s" fill="freeze" begin="0s"/>
    <rect x="200" y="285" width="0" height="8" rx="4" fill="url(#barGrad)" filter="url(#glow)">
      <animate attributeName="width" values="0;500" dur="2.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect>
  </g>
  <!-- Loading percentage -->
  <text x="450" y="278" font-family="'Courier New', monospace" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.4;1" dur="6s" fill="freeze" begin="0s"/>
    SYSTEM BOOT
  </text>

  <!-- MAIN TITLE - DHRUV KHANT -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="5s" fill="freeze" begin="0s"/>

    <!-- Shadow layers for depth -->
    <text x="450" y="355" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
          fill="#7b2fff" text-anchor="middle" opacity="0.3" filter="url(#blur-soft)">DHRUV KHANT</text>
    <text x="453" y="352" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
          fill="#00d4ff" text-anchor="middle" opacity="0.2" filter="url(#blur-soft)">DHRUV KHANT</text>

    <!-- Main title with gradient -->
    <text x="450" y="350" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
          fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow-strong)">DHRUV KHANT</text>

    <!-- Glitch layer 1 -->
    <text x="452" y="350" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
          fill="#ff003c" text-anchor="middle" opacity="0.4">DHRUV KHANT
      <animate attributeName="x" values="452;448;452;454;452" dur="0.15s" repeatCount="indefinite" begin="3.5s"/>
      <animate attributeName="opacity" values="0;0;0.4;0;0;0.4;0" dur="2s" repeatCount="indefinite" begin="3.5s"/>
    </text>
  </g>

  <!-- Subtitle -->
  <text x="450" y="390" font-family="'Courier New', monospace" font-size="13" fill="#00ffcc"
        text-anchor="middle" letter-spacing="6" opacity="0">
    DATA · AI · GENERATIVE · MACHINE LEARNING
    <animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.55;0.7;1" dur="5.5s" fill="freeze" begin="0s"/>
  </text>

  <!-- Corner decorations -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M10,10 L10,30 L30,10 Z" fill="#00d4ff" opacity="0.3"/>
    <line x1="10" y1="10" x2="50" y2="10"/><line x1="10" y1="10" x2="10" y2="50"/>
    <line x1="850" y1="10" x2="890" y2="10"/><line x1="890" y1="10" x2="890" y2="50"/>
    <line x1="10" y1="410" x2="10" y2="370"/><line x1="10" y1="410" x2="50" y2="410"/>
    <line x1="890" y1="410" x2="890" y2="370"/><line x1="890" y1="410" x2="850" y2="410"/>
  </g>

  <!-- Floating particles -->
  <g fill="#00d4ff" filter="url(#glow)">
    <circle cx="80" cy="300" r="1.5" opacity="0.6">
      <animate attributeName="cy" values="300;280;300" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="180" r="2" opacity="0.5">
      <animate attributeName="cy" values="180;160;180" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="380" r="1" opacity="0.7">
      <animate attributeName="cy" values="380;360;380" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="60" r="1.5" opacity="0.6">
      <animate attributeName="cy" values="60;40;60" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#7b2fff" filter="url(#glow)">
    <circle cx="160" cy="200" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="200;185;200" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="350" r="2" opacity="0.5">
      <animate attributeName="cy" values="350;330;350" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#00ffcc" filter="url(#glow)">
    <circle cx="50" cy="150" r="1" opacity="0.7">
      <animate attributeName="cy" values="150;135;150" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="300" r="1.5" opacity="0.6">
      <animate attributeName="cy" values="300;285;300" dur="3.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scan line effect -->
  <rect x="0" y="0" width="900" height="2" fill="#00d4ff" opacity="0.15">
    <animate attributeName="y" values="-2;422" dur="4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>
</svg>
