<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#060614"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="nodeBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </radialGradient>
    <radialGradient id="nodePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bf7fff"/>
      <stop offset="100%" stop-color="#5500cc"/>
    </radialGradient>
    <radialGradient id="nodeCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#007755"/>
    </radialGradient>
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7b2fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="420" fill="url(#bg2)"/>

  <!-- Section title -->
  <text x="450" y="35" font-family="Arial Black, sans-serif" font-size="11" fill="#00d4ff"
        text-anchor="middle" letter-spacing="8" opacity="0.8">— COGNITIVE ARCHITECTURE —</text>

  <!-- Neural connection lines (animated pulse) -->
  <g stroke-width="0.8" fill="none" opacity="0.4">
    <!-- Central hub connections -->
    <line x1="450" y1="210" x2="290" y2="140" stroke="#00d4ff">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="210" x2="610" y2="140" stroke="#7b2fff">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="450" y1="210" x2="200" y2="210" stroke="#00ffcc">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
    </line>
    <line x1="450" y1="210" x2="700" y2="210" stroke="#00d4ff">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.9s" repeatCount="indefinite" begin="0.9s"/>
    </line>
    <line x1="450" y1="210" x2="290" y2="290" stroke="#7b2fff">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.2s" repeatCount="indefinite" begin="0.4s"/>
    </line>
    <line x1="450" y1="210" x2="610" y2="290" stroke="#00ffcc">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.6s" repeatCount="indefinite" begin="0.7s"/>
    </line>
    <!-- Second level -->
    <line x1="290" y1="140" x2="150" y2="100" stroke="#00d4ff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="290" y1="140" x2="200" y2="210" stroke="#7b2fff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="610" y1="140" x2="750" y2="100" stroke="#00ffcc">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="0.2s"/>
    </line>
    <line x1="610" y1="140" x2="700" y2="210" stroke="#00d4ff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
    </line>
    <line x1="200" y1="210" x2="150" y2="300" stroke="#7b2fff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.9s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="700" y1="210" x2="750" y2="300" stroke="#00ffcc">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.1s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="290" y1="290" x2="150" y2="300" stroke="#00d4ff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.7s" repeatCount="indefinite" begin="0.6s"/>
    </line>
    <line x1="610" y1="290" x2="750" y2="300" stroke="#7b2fff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.3s" repeatCount="indefinite" begin="0.4s"/>
    </line>
    <line x1="290" y1="290" x2="450" y2="350" stroke="#00ffcc">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.6s" repeatCount="indefinite" begin="0.9s"/>
    </line>
    <line x1="610" y1="290" x2="450" y2="350" stroke="#00d4ff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.4s" repeatCount="indefinite" begin="0.2s"/>
    </line>
    <!-- Outer connections -->
    <line x1="150" y1="100" x2="80" y2="160" stroke="#7b2fff">
      <animate attributeName="opacity" values="0.05;0.4;0.05" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="750" y1="100" x2="820" y2="160" stroke="#00d4ff">
      <animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.7s" repeatCount="indefinite" begin="0.7s"/>
    </line>
    <line x1="150" y1="300" x2="80" y2="360" stroke="#00ffcc">
      <animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.5s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="750" y1="300" x2="820" y2="360" stroke="#7b2fff">
      <animate attributeName="opacity" values="0.05;0.4;0.05" dur="4.2s" repeatCount="indefinite" begin="0.5s"/>
    </line>
  </g>

  <!-- Traveling signal pulses on connections -->
  <g fill="none">
    <circle r="3" fill="#00d4ff" filter="url(#glow2)" opacity="0.9">
      <animateMotion dur="2.1s" repeatCount="indefinite" path="M450,210 L290,140"/>
    </circle>
    <circle r="3" fill="#7b2fff" filter="url(#glow2)" opacity="0.9">
      <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.4s" path="M290,140 L450,210"/>
    </circle>
    <circle r="2.5" fill="#00ffcc" filter="url(#glow2)" opacity="0.9">
      <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.8s" path="M450,210 L200,210"/>
    </circle>
    <circle r="2.5" fill="#00d4ff" filter="url(#glow2)" opacity="0.9">
      <animateMotion dur="1.9s" repeatCount="indefinite" begin="0.2s" path="M700,210 L450,210"/>
    </circle>
    <circle r="2" fill="#7b2fff" filter="url(#glow2)" opacity="0.8">
      <animateMotion dur="2.2s" repeatCount="indefinite" begin="1s" path="M450,210 L610,290"/>
    </circle>
  </g>

  <!-- Central hub -->
  <circle cx="450" cy="210" r="28" fill="#0a0a2a" stroke="#00d4ff" stroke-width="1.5">
    <animate attributeName="r" values="28;32;28" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="210" r="22" fill="url(#nodeBlue)" opacity="0.6" filter="url(#glow2)">
    <animate attributeName="r" values="22;24;22" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="450" y="215" font-family="'Courier New', monospace" font-size="8" fill="#ffffff"
        text-anchor="middle" font-weight="bold">DHRUV</text>

  <!-- Layer 1 nodes -->
  <g>
    <!-- Node: Python -->
    <circle cx="290" cy="140" r="18" fill="#0a0a2a" stroke="#7b2fff" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="290" cy="140" r="13" fill="url(#nodePurple)" opacity="0.7" filter="url(#softglow)"/>
    <text x="290" y="144" font-family="'Courier New', monospace" font-size="7" fill="#fff" text-anchor="middle">AI</text>

    <!-- Node: ML -->
    <circle cx="610" cy="140" r="18" fill="#0a0a2a" stroke="#00ffcc" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="610" cy="140" r="13" fill="url(#nodeCyan)" opacity="0.7" filter="url(#softglow)"/>
    <text x="610" y="144" font-family="'Courier New', monospace" font-size="7" fill="#fff" text-anchor="middle">ML</text>

    <!-- Node: Data -->
    <circle cx="200" cy="210" r="16" fill="#0a0a2a" stroke="#00d4ff" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="200" cy="210" r="11" fill="url(#nodeBlue)" opacity="0.7" filter="url(#softglow)"/>
    <text x="200" y="214" font-family="'Courier New', monospace" font-size="6" fill="#fff" text-anchor="middle">DATA</text>

    <!-- Node: LLM -->
    <circle cx="700" cy="210" r="16" fill="#0a0a2a" stroke="#7b2fff" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="700" cy="210" r="11" fill="url(#nodePurple)" opacity="0.7" filter="url(#softglow)"/>
    <text x="700" y="214" font-family="'Courier New', monospace" font-size="6" fill="#fff" text-anchor="middle">LLM</text>

    <!-- Node: RAG -->
    <circle cx="290" cy="290" r="16" fill="#0a0a2a" stroke="#00ffcc" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="290" cy="290" r="11" fill="url(#nodeCyan)" opacity="0.7" filter="url(#softglow)"/>
    <text x="290" y="294" font-family="'Courier New', monospace" font-size="6" fill="#fff" text-anchor="middle">RAG</text>

    <!-- Node: GEN -->
    <circle cx="610" cy="290" r="16" fill="#0a0a2a" stroke="#00d4ff" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
    <circle cx="610" cy="290" r="11" fill="url(#nodeBlue)" opacity="0.7" filter="url(#softglow)"/>
    <text x="610" y="294" font-family="'Courier New', monospace" font-size="6" fill="#fff" text-anchor="middle">GEN</text>
  </g>

  <!-- Layer 2 nodes -->
  <g>
    <circle cx="150" cy="100" r="12" fill="#0a0a2a" stroke="#00d4ff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="100" r="8" fill="url(#nodeBlue)" opacity="0.5" filter="url(#softglow)"/>
    <text x="150" y="104" font-family="'Courier New', monospace" font-size="5.5" fill="#ccc" text-anchor="middle">VIZ</text>

    <circle cx="750" cy="100" r="12" fill="#0a0a2a" stroke="#7b2fff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="750" cy="100" r="8" fill="url(#nodePurple)" opacity="0.5" filter="url(#softglow)"/>
    <text x="750" y="104" font-family="'Courier New', monospace" font-size="5.5" fill="#ccc" text-anchor="middle">BI</text>

    <circle cx="150" cy="300" r="12" fill="#0a0a2a" stroke="#00ffcc" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="150" cy="300" r="8" fill="url(#nodeCyan)" opacity="0.5" filter="url(#softglow)"/>
    <text x="150" y="304" font-family="'Courier New', monospace" font-size="5.5" fill="#ccc" text-anchor="middle">MCP</text>

    <circle cx="750" cy="300" r="12" fill="#0a0a2a" stroke="#00d4ff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="750" cy="300" r="8" fill="url(#nodeBlue)" opacity="0.5" filter="url(#softglow)"/>
    <text x="750" y="304" font-family="'Courier New', monospace" font-size="5.5" fill="#ccc" text-anchor="middle">AUTO</text>

    <circle cx="450" cy="350" r="12" fill="#0a0a2a" stroke="#7b2fff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.6s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="450" cy="350" r="8" fill="url(#nodePurple)" opacity="0.5" filter="url(#softglow)"/>
    <text x="450" y="354" font-family="'Courier New', monospace" font-size="5.5" fill="#ccc" text-anchor="middle">CLOUD</text>
  </g>

  <!-- Outer nodes -->
  <g opacity="0.5">
    <circle cx="80" cy="160" r="8" fill="none" stroke="#00d4ff" stroke-width="0.8">
      <animate attributeName="r" values="8;10;8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="160" r="8" fill="none" stroke="#7b2fff" stroke-width="0.8">
      <animate attributeName="r" values="8;10;8" dur="3.7s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="80" cy="360" r="8" fill="none" stroke="#00ffcc" stroke-width="0.8">
      <animate attributeName="r" values="8;10;8" dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="820" cy="360" r="8" fill="none" stroke="#00d4ff" stroke-width="0.8">
      <animate attributeName="r" values="8;10;8" dur="3.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
  </g>

  <!-- Central glow aura -->
  <circle cx="450" cy="210" r="60" fill="#7b2fff" opacity="0.03" filter="url(#glow2)">
    <animate attributeName="r" values="60;80;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.03;0.07;0.03" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom label -->
  <text x="450" y="410" font-family="'Courier New', monospace" font-size="9" fill="#7b2fff"
        text-anchor="middle" letter-spacing="4" opacity="0.6">NEURAL INTELLIGENCE NETWORK</text>
</svg>
